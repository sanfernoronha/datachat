# docker-compose.yml
#
# Full-stack DataChat environment.
#
# Usage:
#   1. Copy .env.example to .env and fill in your API keys
#   2. docker compose up              # start everything
#
# Services:
#   app     — Next.js application (port 3000)
#   db      — PostgreSQL 15 (port 5432)
#   sandbox — AIO Sandbox for code execution (port 8888)
#   minio   — S3-compatible object storage (API 9000, console 9001)

services:
  # ── Next.js App ──────────────────────────────────────────────────────────────
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # These override .env values to use Docker service names instead of localhost
      DATABASE_URL: "postgresql://postgres:password@db:5432/datachat?schema=public"
      SANDBOX_URL: "http://sandbox:8080"
      S3_ENDPOINT: "http://minio:9000"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      S3_BUCKET: "datachat"
      NODE_ENV: production
    env_file:
      - .env      # API keys (ANTHROPIC_API_KEY, OPENAI_API_KEY, etc.)
    depends_on:
      db:
        condition: service_healthy
      sandbox:
        condition: service_started
      minio:
        condition: service_healthy

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: datachat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── AIO Sandbox ───────────────────────────────────────────────────────────
  # All-in-one sandbox: Jupyter kernel, shell, file system, browser.
  # Docs: https://github.com/agent-infra/sandbox
  sandbox:
    image: ghcr.io/agent-infra/sandbox:latest
    restart: unless-stopped
    security_opt:
      - seccomp=unconfined
    ports:
      - "8888:8080"
    shm_size: "2gb"
    environment:
      - DISABLE_CODE_SERVER=true
    deploy:
      resources:
        limits:
          memory: 4G

  # ── MinIO (S3-compatible object storage) ─────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # Web console (minioadmin / minioadmin)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
